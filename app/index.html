<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kirtos AI — voice-powered intelligent assistant" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#030303" />

  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- Preconnect to Google Fonts (eliminates DNS+TLS latency) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Non-blocking font loading (replaces render-blocking CSS @import) -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" />
  </noscript>

  <!-- Preconnect to WebSocket backend -->
  <link rel="preconnect" href="http://localhost:3001" />

  <title>Kirtos AI</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
